{% extends "base.html" %}
{% block title %}New Post – InstaPy{% endblock %}

{% block content %}
<div class="upload-wrapper">
  <h2 style="margin-bottom:6px;font-size:1.3rem">Create New Post</h2>
  <p style="color:var(--muted);font-size:14px;margin-bottom:24px">
    Share a photo with your followers
  </p>

  <div class="card" style="padding:28px">
    <form method="POST" action="{{ url_for('upload') }}" enctype="multipart/form-data">

      <!-- Dropzone -->
      <label id="upload-dropzone" class="upload-dropzone" for="image-input">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none"
             viewBox="0 0 24 24" stroke="var(--muted)" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>Drag & drop or click to choose an image</p>
        <p style="font-size:12px">PNG, JPG, GIF, WEBP • Max 16 MB</p>
        <input type="file" id="image-input" name="image" accept="image/*"
               style="display:none" required>
        <img id="image-preview" src="" alt="Preview">
      </label>

      <!-- Caption -->
      <div class="form-group" style="margin-top:20px">
        <label for="caption">Caption</label>
        <textarea class="form-control" id="caption" name="caption"
                  placeholder="Write a caption…" rows="3"
                  style="resize:vertical" maxlength="2200"></textarea>
      </div>

      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary" style="flex:1">Share</button>
        <a href="{{ url_for('feed') }}" class="btn btn-outline" style="flex:1;text-align:center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
