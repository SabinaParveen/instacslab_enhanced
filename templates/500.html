{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="text-align:center;max-width:400px">
    <div style="font-size:5rem;font-family:'Playfair Display',serif;color:var(--danger);line-height:1">500</div>
    <h2 style="margin:12px 0 8px">Something went wrong</h2>
    <p style="color:var(--muted);margin-bottom:24px">
      The server ran into an unexpected error. Please try again in a moment.
    </p>
    <a href="{{ url_for('feed') }}" class="btn btn-primary" style="display:inline-flex">
      ← Back to Feed
    </a>
  </div>
</div>
{% endblock %}
