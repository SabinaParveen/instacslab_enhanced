{% extends "base.html" %}
{% block title %}Edit Profile – InstaPy{% endblock %}

{% block content %}
<div class="page-wrapper" style="max-width:600px">
  <div class="card">
    <h2 style="margin-bottom:24px">Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">

      <!-- Avatar preview + upload -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px">
        <img id="avatar-preview"
             src="{{ user.avatar_url or url_for('static', filename='images/default_avatar.png') }}"
             alt="Avatar"
             style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border)">
        <div>
          <label class="btn btn-outline btn-sm" for="avatar-input" style="cursor:pointer">
            Change Photo
          </label>
          <input id="avatar-input" type="file" name="avatar" accept="image/*"
                 style="display:none" onchange="previewAvatar(this)">
          <p style="font-size:12px;color:var(--muted);margin-top:6px">
            JPG, PNG, GIF or WEBP · Max 16 MB
          </p>
        </div>
      </div>

      <!-- Bio -->
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" rows="3" placeholder="Tell people a bit about yourself…"
                  style="resize:vertical">{{ user.bio or '' }}</textarea>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}" required>
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:24px 0">
      <h3 style="margin-bottom:16px;font-size:16px">Change Password</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
        Leave blank to keep your current password.
      </p>

      <!-- Current password -->
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" autocomplete="current-password">
      </div>

      <!-- New password -->
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" autocomplete="new-password"
               minlength="6" placeholder="At least 6 characters">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
        Save Changes
      </button>
    </form>
  </div>
</div>

<script>
function previewAvatar(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => document.getElementById('avatar-preview').src = e.target.result;
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
