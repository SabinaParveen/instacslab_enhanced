# render.yaml — Render Blueprint for InstaPy
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: instacslab
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: instacslab-db
          property: connectionString
    disk:
      name: uploads
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 1

databases:
  - name: instacslab-db
    databaseName: instacslab
    user: instacslab
    plan: free
